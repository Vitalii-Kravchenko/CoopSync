appId: com.coopsync.app
productName: CoopSync
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
# Lets the packaged app's autoUpdater find new releases (reads latest.yml from
# the GitHub release assets). npm run dist always passes --publish never, so
# this alone doesn't upload anything — releases stay a manual `gh release`
# step, we just also attach dist/latest.yml to them from now on.
publish:
  provider: github
  owner: Vitalii-Kravchenko
  repo: CoopSync
win:
  target: nsis
nsis:
  # No spaces: electron-builder's own auto-updater metadata (latest.yml) always
  # references a GitHub-safe filename (spaces -> dashes) regardless of this
  # setting -- if the actual built installer still has spaces, `gh release
  # upload` lets GitHub rewrite them to dots instead, and the two names stop
  # matching (404 when the app tries to download the update). Building the
  # installer with the same dash-based name from the start keeps them in sync.
  artifactName: '${productName}-Setup-${version}.${ext}'
  # oneClick is what actually makes silent in-app updates possible -- NSIS's
  # /S silent flag (which quitAndInstall uses) still shows the full wizard for
  # an "assisted" (oneClick: false) installer; only a one-click installer can
  # truly update in the background with just a restart. Trade-off: no more
  # install-directory picker or installer language dialog (the app still has
  # its own in-settings language switcher) -- see build/installer.nsh for the
  # Smart App Control check that replaces the old welcome-page warning, which
  # relied on there being a wizard page to show it on.
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: true
  # Still compiled in so build/installer.nsh's Smart App Control MessageBox
  # can show in the OS's UI language -- oneClick just means no picker DIALOG.
  installerLanguages:
    - en_US
    - uk_UA
    - de_DE
    - fr_FR
    - pl_PL
    - ru_RU
    - es_ES
    - pt_BR
    - tr_TR
    - zh_CN
