appId: com.coopsync.app
productName: CoopSync
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
# Lets the packaged app's autoUpdater find new releases (reads latest.yml from
# the GitHub release assets). npm run dist always passes --publish never, so
# this alone doesn't upload anything — releases stay a manual `gh release`
# step, we just also attach dist/latest.yml to them from now on.
publish:
  provider: github
  owner: Vitalii-Kravchenko
  repo: CoopSync
win:
  target: nsis
nsis:
  # No spaces: electron-builder's own auto-updater metadata (latest.yml) always
  # references a GitHub-safe filename (spaces -> dashes) regardless of this
  # setting -- if the actual built installer still has spaces, `gh release
  # upload` lets GitHub rewrite them to dots instead, and the two names stop
  # matching (404 when the app tries to download the update). Building the
  # installer with the same dash-based name from the start keeps them in sync.
  artifactName: '${productName}-Setup-${version}.${ext}'
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
  displayLanguageSelector: true
  installerLanguages:
    - en_US
    - uk_UA
    - de_DE
    - fr_FR
    - pl_PL
    - ru_RU
    - es_ES
    - pt_BR
    - tr_TR
    - zh_CN
