appId: com.coopsync.app
productName: CoopSync
directories:
  output: dist
  buildResources: build
files:
  - out/**/*
  - package.json
win:
  target: nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
  displayLanguageSelector: true
  installerLanguages:
    - en_US
    - uk_UA
    - de_DE
    - fr_FR
    - pl_PL
    - ru_RU
    - es_ES
    - pt_BR
    - tr_TR
    - zh_CN
